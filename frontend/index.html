<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .status-badge { text-transform: capitalize; }
    .book-card { transition: box-shadow 0.2s; }
    .book-card:hover { box-shadow: 0 0.25rem 0.5rem rgba(0,0,0,0.1); }
    @media (min-width: 576px) { .btn-add { width: auto !important; } }
  </style>
</head>
<body>
<div x-data="bookApp()" x-init="init()" class="min-vh-100 bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container flex-wrap gap-2">
      <span class="navbar-brand mb-0 h1">Book Tracker</span>
      <div class="d-flex align-items-center gap-2">
        <input type="password" class="form-control form-control-sm" style="width:auto; min-width:140px; max-width:200px"
               placeholder="API Key" x-model="apiKey" @input="saveApiKey()">
        <button class="btn btn-sm btn-outline-light" @click="showApiKey = !showApiKey"
                x-text="showApiKey ? 'Hide' : 'Show'"></button>
      </div>
    </div>
  </nav>

  <!-- Reveal API key -->
  <template x-if="showApiKey && apiKey">
    <div class="container mb-3">
      <div class="alert alert-info py-2 mb-0">
        API Key: <code x-text="apiKey"></code>
      </div>
    </div>
  </template>

  <div class="container">

    <!-- Error alert -->
    <template x-if="error">
      <div class="alert alert-danger alert-dismissible">
        <span x-text="error"></span>
        <button type="button" class="btn-close" @click="error = null"></button>
      </div>
    </template>

    <!-- Toolbar -->
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2 mb-3">
      <ul class="nav nav-pills flex-wrap">
        <template x-for="s in statuses" :key="s.value">
          <li class="nav-item">
            <a class="nav-link py-1 px-2 px-sm-3" href="#" :class="{ active: filter === s.value }"
               @click.prevent="filter = s.value; fetchBooks()"
               x-text="s.label"></a>
          </li>
        </template>
      </ul>
      <button class="btn btn-primary w-100 btn-add flex-shrink-0" @click="openAddModal()">+ Add Book</button>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-5">
      <div class="spinner-border" role="status"></div>
    </div>

    <!-- Empty state -->
    <div x-show="!loading && books.length === 0" class="text-center py-5 text-muted">
      <p class="fs-5">No books found.</p>
    </div>

    <!-- Book grid -->
    <div class="row g-3" x-show="!loading">
      <template x-for="book in books" :key="book.id">
        <div class="col-md-6 col-lg-4">
          <div class="card book-card h-100">
            <div class="card-body">
              <h5 class="card-title" x-text="book.title"></h5>
              <h6 class="card-subtitle mb-2 text-muted" x-text="book.author"></h6>
              <span class="badge status-badge mb-2"
                    :class="statusColor(book.status)"
                    x-text="statusLabel(book.status)"></span>
              <p class="card-text small text-muted" x-show="book.notes" x-text="book.notes"></p>
              <div class="small text-muted" x-show="book.start_date">
                Started: <span x-text="formatDate(book.start_date)"></span>
              </div>
              <div class="small text-muted" x-show="book.finish_date">
                Finished: <span x-text="formatDate(book.finish_date)"></span>
              </div>
            </div>
            <div class="card-footer bg-transparent d-flex gap-2">
              <button class="btn btn-sm btn-outline-secondary" @click="openEditModal(book)">Edit</button>
              <button class="btn btn-sm btn-outline-danger" @click="confirmDelete(book)">Delete</button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal fade" id="bookModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form @submit.prevent="saveBook()">
          <div class="modal-header">
            <h5 class="modal-title" x-text="editingBook ? 'Edit Book' : 'Add Book'"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input type="text" class="form-control" x-model="form.title" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Author</label>
              <input type="text" class="form-control" x-model="form.author" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Status</label>
              <select class="form-select" x-model="form.status">
                <option value="wantToRead">Want to Read</option>
                <option value="reading">Reading</option>
                <option value="finished">Finished</option>
                <option value="dnf">Did Not Finish</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Notes</label>
              <textarea class="form-control" rows="3" x-model="form.notes"></textarea>
            </div>
            <div class="row">
              <div class="col-6">
                <label class="form-label">Start Date</label>
                <input type="date" class="form-control" x-model="form.start_date">
              </div>
              <div class="col-6">
                <label class="form-label">Finish Date</label>
                <input type="date" class="form-control" x-model="form.finish_date">
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" :disabled="saving">
              <span x-show="saving" class="spinner-border spinner-border-sm me-1"></span>
              <span x-text="editingBook ? 'Update' : 'Add'"></span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Delete Book</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          Delete <strong x-text="deletingBook?.title"></strong>?
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" @click="deleteBook()" :disabled="saving">Delete</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
function bookApp() {
  return {
    apiKey: '',
    showApiKey: false,
    books: [],
    loading: false,
    saving: false,
    error: null,
    filter: '',
    editingBook: null,
    deletingBook: null,
    form: { title: '', author: '', status: 'wantToRead', notes: '', start_date: '', finish_date: '' },
    statuses: [
      { value: '', label: 'All' },
      { value: 'wantToRead', label: 'Want to Read' },
      { value: 'reading', label: 'Reading' },
      { value: 'finished', label: 'Finished' },
      { value: 'dnf', label: 'DNF' },
    ],

    init() {
      this.apiKey = localStorage.getItem('booktracker_api_key') || '';
      if (this.apiKey) this.fetchBooks();
    },

    saveApiKey() {
      localStorage.setItem('booktracker_api_key', this.apiKey);
      this.fetchBooks();
    },

    headers() {
      return { 'X-API-Key': this.apiKey, 'Content-Type': 'application/json' };
    },

    async fetchBooks() {
      if (!this.apiKey) return;
      this.loading = true;
      this.error = null;
      try {
        const url = this.filter ? `/books?status=${this.filter}` : '/books';
        const res = await fetch(url, { headers: this.headers() });
        if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);
        this.books = await res.json();
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },

    openAddModal() {
      this.editingBook = null;
      this.form = { title: '', author: '', status: 'wantToRead', notes: '', start_date: '', finish_date: '' };
      new bootstrap.Modal(document.getElementById('bookModal')).show();
    },

    openEditModal(book) {
      this.editingBook = book;
      this.form = {
        title: book.title,
        author: book.author,
        status: book.status,
        notes: book.notes || '',
        start_date: book.start_date ? book.start_date.slice(0, 10) : '',
        finish_date: book.finish_date ? book.finish_date.slice(0, 10) : '',
      };
      new bootstrap.Modal(document.getElementById('bookModal')).show();
    },

    async saveBook() {
      this.saving = true;
      this.error = null;
      try {
        const body = { ...this.form };
        if (!body.notes) body.notes = null;
        if (!body.start_date) body.start_date = null;
        if (!body.finish_date) body.finish_date = null;

        let res;
        if (this.editingBook) {
          res = await fetch(`/books/${this.editingBook.id}`, {
            method: 'PUT', headers: this.headers(), body: JSON.stringify(body),
          });
        } else {
          res = await fetch('/books', {
            method: 'POST', headers: this.headers(), body: JSON.stringify(body),
          });
        }
        if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);
        bootstrap.Modal.getInstance(document.getElementById('bookModal')).hide();
        await this.fetchBooks();
      } catch (e) {
        this.error = e.message;
      } finally {
        this.saving = false;
      }
    },

    confirmDelete(book) {
      this.deletingBook = book;
      new bootstrap.Modal(document.getElementById('deleteModal')).show();
    },

    async deleteBook() {
      this.saving = true;
      this.error = null;
      try {
        const res = await fetch(`/books/${this.deletingBook.id}`, {
          method: 'DELETE', headers: this.headers(),
        });
        if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);
        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
        await this.fetchBooks();
      } catch (e) {
        this.error = e.message;
      } finally {
        this.saving = false;
      }
    },

    statusColor(s) {
      return {
        wantToRead: 'bg-secondary',
        reading: 'bg-primary',
        finished: 'bg-success',
        dnf: 'bg-warning text-dark',
      }[s] || 'bg-secondary';
    },

    statusLabel(s) {
      return { wantToRead: 'Want to Read', reading: 'Reading', finished: 'Finished', dnf: 'DNF' }[s] || s;
    },

    formatDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString();
    },
  };
}
</script>
</body>
</html>
